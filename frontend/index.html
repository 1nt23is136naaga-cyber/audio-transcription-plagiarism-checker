<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Transcription & Plagiarism Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
      color: #f8fafc;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7c85a2;
      margin-bottom: 16px;
    }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }

    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btnStart  { background: #3b82f6; color: #fff; }
    #btnStop   { background: #ef4444; color: #fff; }
    #btnPlagi  { background: #8b5cf6; color: #fff; }

    /* ── Status pill ── */
    #recStatus {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 12px;
    }
    #recStatus .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #64748b;
    }
    #recStatus.recording .dot {
      background: #ef4444;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ── Textarea ── */
    textarea {
      width: 100%;
      min-height: 120px;
      background: #13161f;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 12px;
      color: #e2e8f0;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
      line-height: 1.5;
    }
    textarea:focus { border-color: #3b82f6; }
    textarea::placeholder { color: #475569; }

    /* ── Results ── */
    #resultsBox { display: none; }

    .score-badge {
      display: inline-block;
      font-size: 2rem;
      font-weight: 800;
      padding: 8px 20px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .score-low  { background: #052e16; color: #4ade80; }
    .score-mid  { background: #431407; color: #fb923c; }
    .score-high { background: #450a0a; color: #f87171; }

    .sources-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #7c85a2;
      margin-bottom: 10px;
    }

    .source-item {
      background: #13161f;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .source-item a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.85rem;
      word-break: break-all;
    }
    .source-item a:hover { text-decoration: underline; }
    .source-pct {
      font-size: 0.8rem;
      font-weight: 700;
      color: #fb923c;
      white-space: nowrap;
    }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid #334155;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading .spinner { display: inline-block; }
    .loading .btn-text { display: none; }

    /* ── Error toast ── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #450a0a;
      color: #f87171;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 0.85rem;
      max-width: 340px;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>

<h1>🎙️ Audio Transcription & Plagiarism Checker</h1>

<!-- ── Step 1: Record ── -->
<div class="card">
  <h2>Step 1 — Record Audio</h2>
  <div class="btn-row">
    <button id="btnStart">▶ Start Recording</button>
    <button id="btnStop" disabled>⏹ Stop Recording</button>
  </div>
  <div id="recStatus">
    <span class="dot"></span>
    <span id="recLabel">Idle</span>
  </div>
</div>

<!-- ── Step 2: Transcription ── -->
<div class="card">
  <h2>Step 2 — Live Transcription (Web Speech API)</h2>
  <textarea
    id="transcriptArea"
    placeholder="Text appears here in real-time as you speak. You can also type or paste text manually."
    spellcheck="false"
  ></textarea>
  <div style="margin-top:10px;">
    <button id="btnTranscribe" disabled style="display:none">
      <span class="btn-text">📤 Transcribe Audio</span>
      <span class="spinner"></span>
    </button>
  </div>
</div>

<!-- ── Step 3: Plagiarism ── -->
<div class="card">
  <h2>Step 3 — Plagiarism Check</h2>
  <button id="btnPlagi" disabled>
    <span class="btn-text">🔍 Check Plagiarism</span>
    <span class="spinner"></span>
  </button>

  <div id="resultsBox" style="margin-top:20px;">
    <div id="scoreBadge" class="score-badge">0%</div>
    <div class="sources-title">Matched Sources</div>
    <div id="sourcesList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:8000';

  // ── State ───────────────────────────────────────────────────────────────────
  let mediaRecorder  = null;
  let audioChunks    = [];
  let recognition    = null;
  let liveTranscript = '';

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const btnStart       = document.getElementById('btnStart');
  const btnStop        = document.getElementById('btnStop');
  const btnTranscribe  = document.getElementById('btnTranscribe');
  const btnPlagi       = document.getElementById('btnPlagi');
  const recStatus      = document.getElementById('recStatus');
  const recLabel       = document.getElementById('recLabel');
  const transcriptArea = document.getElementById('transcriptArea');
  const resultsBox     = document.getElementById('resultsBox');
  const scoreBadge     = document.getElementById('scoreBadge');
  const sourcesList    = document.getElementById('sourcesList');
  const toast          = document.getElementById('toast');

  // ── Speech Recognition setup ────────────────────────────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const hasSpeechAPI = !!SpeechRecognition;

  // Hide the "Transcribe Audio" button — transcription is now live
  btnTranscribe.style.display = 'none';

  // ── Toast ───────────────────────────────────────────────────────────────────
  function showError(msg) {
    toast.textContent = '⚠️  ' + msg;
    toast.style.display = 'block';
    clearTimeout(showError._t);
    showError._t = setTimeout(() => { toast.style.display = 'none'; }, 7000);
  }

  // ── Start Recording ─────────────────────────────────────────────────────────
  btnStart.addEventListener('click', async () => {
    if (!hasSpeechAPI) {
      showError('Your browser does not support the Web Speech API. Please use Chrome or Edge.');
      return;
    }

    try {
      // Request mic permission (needed for MediaRecorder; Speech API manages its own stream)
      await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      showError('Microphone access denied: ' + err.message);
      return;
    }

    liveTranscript = '';
    transcriptArea.value = '';
    resultsBox.style.display = 'none';
    btnPlagi.disabled = true;
    btnStart.disabled = true;
    btnStop.disabled  = false;
    recStatus.classList.add('recording');
    recLabel.textContent = 'Recording & transcribing live…';

    // ── Web Speech API ──────────────────────────────────────────────────────
    recognition = new SpeechRecognition();
    recognition.continuous      = true;
    recognition.interimResults  = true;
    recognition.lang            = 'en-US';

    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          liveTranscript += t + ' ';
        } else {
          interim = t;
        }
      }
      transcriptArea.value = liveTranscript + interim;
    };

    recognition.onerror = (e) => {
      if (e.error !== 'aborted') showError('Speech recognition error: ' + e.error);
    };

    recognition.onend = () => {
      // Auto-restart while recording is still active
      if (!btnStop.disabled) {
        try { recognition.start(); } catch (_) {}
      }
    };

    recognition.start();
  });

  // ── Stop Recording ──────────────────────────────────────────────────────────
  btnStop.addEventListener('click', () => {
    if (recognition) {
      recognition.onend = null;   // Prevent auto-restart
      recognition.stop();
      recognition = null;
    }

    btnStop.disabled  = true;
    btnStart.disabled = false;
    recStatus.classList.remove('recording');

    const finalText = transcriptArea.value.trim();
    recLabel.textContent = finalText
      ? `Done — ${finalText.split(/\s+/).length} words transcribed`
      : 'Recording stopped (no speech detected)';

    btnPlagi.disabled = !finalText;
  });

  // ── Plagiarism ──────────────────────────────────────────────────────────────
  btnPlagi.addEventListener('click', async () => {
    const text = transcriptArea.value.trim();
    if (!text) { showError('No text to check. Please record some speech first.'); return; }

    setLoading(btnPlagi, true);
    resultsBox.style.display = 'none';

    try {
      const resp = await fetch(`${API}/plagiarism`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }
      const data = await resp.json();
      renderResults(data);
    } catch (err) {
      showError('Plagiarism check failed: ' + err.message);
    } finally {
      setLoading(btnPlagi, false);
    }
  });

  // ── Render plagiarism results ───────────────────────────────────────────────
  function renderResults({ score = 0, sources = [] }) {
    scoreBadge.textContent = score.toFixed(1) + '%';
    scoreBadge.className = 'score-badge ' +
      (score < 20 ? 'score-low' : score < 50 ? 'score-mid' : 'score-high');

    sourcesList.innerHTML = '';
    if (!sources.length) {
      sourcesList.innerHTML = '<p style="color:#475569;font-size:.85rem;">No matched sources found.</p>';
    } else {
      sources.forEach(src => {
        const item = document.createElement('div');
        item.className = 'source-item';
        const isUrl = src.url && src.url.startsWith('http');
        item.innerHTML = `
          <span>${isUrl
            ? `<a href="${src.url}" target="_blank" rel="noopener">${src.title || src.url}</a>`
            : `<span style="color:#94a3b8">${src.title || src.url || 'Unknown source'}</span>`}</span>
          <span class="source-pct">${src.similarity ?? 0}%</span>`;
        sourcesList.appendChild(item);
      });
    }
    resultsBox.style.display = 'block';
  }

  // ── Loading helper ──────────────────────────────────────────────────────────
  function setLoading(btn, state) {
    btn.disabled = state;
    state ? btn.classList.add('loading') : btn.classList.remove('loading');
  }

  // ── Allow manual text entry ────────────────────────────────────────────────
  transcriptArea.addEventListener('input', () => {
    btnPlagi.disabled = !transcriptArea.value.trim();
  });
</script>
</body>
</html>
