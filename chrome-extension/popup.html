<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Interview Authenticity Checker</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 800px;
      height: 600px;
      background: #080c14;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .setup-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #080c14;
      color: #e2eaf6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 20px;
      text-align: center;
    }
    input {
      padding: 10px;
      margin: 10px 0;
      width: 300px;
      border-radius: 6px;
      border: 1px solid #1e2d45;
      background: #0f1623;
      color: white;
    }
    button {
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

  <!-- This overlay will show until you enter your Render URL -->
  <div id="setup" class="setup-overlay">
    <h2>Welcome to Interview Checker</h2>
    <p>Please enter your deployed Render URL to connect the extension to your backend.</p>
    <p style="font-size: 12px; color: #6b7fa3;">Example: https://your-app-name.onrender.com/interview</p>
    <input type="text" id="serverUrl" placeholder="https://...">
    <button id="saveBtn">Connect</button>
  </div>

  <iframe id="appFrame" allow="microphone"></iframe>

  <script src="popup.js"></script>
</body>
</html>
